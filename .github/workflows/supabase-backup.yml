name: Supabase daily backup

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Export google_places (detailing)
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://nytdhsfeqotlxckmnrcb.supabase.co/rest/v1/google_places?select=*&order=title.asc" \
            -o data/detailing.json

      - name: Export restaurants
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://nytdhsfeqotlxckmnrcb.supabase.co/rest/v1/restaurants?select=*&order=title.asc" \
            -o data/restaurants.json

      - name: Export clients
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "https://nytdhsfeqotlxckmnrcb.supabase.co/rest/v1/clients?select=*&order=added_at.desc" \
            -o data/clients.json

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "backup: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
